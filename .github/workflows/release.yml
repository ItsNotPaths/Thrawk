name: Release
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        type: string
      notes:
        description: 'Release notes'
        required: false
        type: string
        default: ''
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false

env:
  PROJECT_NAME: Thrawk

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwayland-dev \
            libxkbcommon-dev \
            libfreetype-dev \
            zip

      - name: Cache vendor/
        uses: actions/cache@v4
        with:
          path: vendor
          key: vendor-linux-${{ hashFiles('download-deps.sh') }}

      - name: Download deps
        run: |
          chmod +x ./download-deps.sh
          ./download-deps.sh

      - name: Install Nim toolchain
        run: |
          curl -fsSL https://nim-lang.org/download/nim-2.2.4-linux_x64.tar.xz | tar xJ -C /opt
          echo /opt/nim-2.2.4/bin >> $GITHUB_PATH

      - name: Build
        run: |
          nim c -d:release -d:wayland --opt:speed \
              -o:"$PROJECT_NAME" "src/$PROJECT_NAME.nim"
          strip --strip-all "$PROJECT_NAME"

      - name: Stage artifacts
        run: |
          mkdir -p dist
          cp "$PROJECT_NAME" dist/
          cp -r themes dist/
          [ -f README.md ] && cp README.md dist/ || true
          [ -f LICENSE ] && cp LICENSE dist/ || true

      - uses: actions/upload-artifact@v4
        with:
          name: linux-zip
          path: dist

  release:
    needs: [build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: linux-zip
          path: linux-zip

      - name: Package
        run: |
          (cd linux-zip && zip -r "../${PROJECT_NAME}-linux.zip" .)

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PRERELEASE_FLAG=""
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "${{ inputs.version }}" \
              "${PROJECT_NAME}-linux.zip" \
              --repo "${{ github.repository }}" \
              --title "${{ inputs.version }}" \
              --notes "${{ inputs.notes }}" \
              $PRERELEASE_FLAG
